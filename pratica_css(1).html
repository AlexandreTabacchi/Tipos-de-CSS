<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link real="stylesheet" href="style.css"
	<title>Aula CSS - 1</title>
</head>

<style>

	.card{
		width: 500px;
		height: fit-content;
		background-color: aliceblue;
		border: solid 2px darkblue;
		border-radius: 25px;
		margin: 20px;
		padding:25px;
		}
		.text{
			font-family: monospace;
		}
		.title{
			font-size: 30px;
		}
		.paragraph{
			font-size: 15px;
		}
		.msg{
			font-size: 15px
		}
		.main-color{
			color: darkblue;
		}
</style>

<body>
	<div class="card">

		<div style="width: 100px; height: 100px; border-radius: 50%;">
			<img style="width: 100%;  height: 100%; margin-top: 20px;" src=" https://cdn-icons-png.flaticon.com/512/706/706830.png" alt="">
		</div>
		
		<div>
			<h1 class="text title">
				Meu nome é: <span style="color:darkblue">Adriana</span> 
			</h1>
			
			<p style="font-family: monospace; font-size: 15px;">
				Mensagem: <i><span class="msg main-color">vida não é um morango!</span></i>
			</p>
		</div>
	</div>
</div>

	<div class="card">

		<div style="width: 100px; height: 100px; border-radius: 25px;">
			<img style="width: 100%;  height: 100%; margin-top: 20px;" src="https://cdn-icons-png.flaticon.com/256/3681/3681928.png" alt="">
		</div>

		<div>
			<h1 class="text tittle">
				Meu nome é: <span style="color:darkblue">Hugo</span> 
			</h1>

			<p style="font-family: monospace; font-size: 15px;">
				Mensagem: <i><span class="msg main-color">Um dia é da caça, o outro é do caçador.</span></i>
			</p>
		</div>
	</div>

</body>

</html>
