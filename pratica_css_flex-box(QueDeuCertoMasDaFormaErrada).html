<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula flexbox</title>

    <style>
        body {
            
            font-family: Arial, sans-serif;

        }

        .caixa.pai {
            
            height: 500px;
            background-color: #e2d3bf;
            border: 2px solid black;
            display: flex;
            flex-direction: row;
            justify-content: flex-start; 
            align-items: flex-start;     

        }

        .caixa.filho {
            
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            font-weight: bold;

        }

        .cor1 {
            
            background-color: #e90f4f;

        }

        .cor2 {
           
            background-color: #5fa3ad;
            align-self: center;

        }

        .cor3 {
            
            background-color: #e3a64f;
            align-self: flex-end;

        }
    </style>
</head>

<body>

    <h1>Aula flex-box</h1>

    <div class="caixa pai">
        
        <div class="caixa filho cor1">1</div>
        <div class="caixa filho cor2">3</div>
        <div class="caixa filho cor3">2</div>

    </div>

</body>
</html>
